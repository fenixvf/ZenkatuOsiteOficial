services:
  - type: web
    name: zenkatu
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm -w run build:render
    startCommand: node --enable-source-maps ./artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
