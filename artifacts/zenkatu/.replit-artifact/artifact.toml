kind = "web"
previewPath = "/"
title = "Zenkatu Streaming"
version = "1.0.0"
id = "artifacts/zenkatu"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24662

[services.development]
run = "pnpm --filter @workspace/zenkatu run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/zenkatu", "run", "build" ]
publicDir = "artifacts/zenkatu/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24662"
BASE_PATH = "/"
